<!DOCTYPE html>
<html>
<head>
  <title>E-Commerce Catalog</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f4f4f4;
    }
    h1 {
      color: #333;
    }
    button {
      padding: 8px 12px;
      margin: 5px 0;
      cursor: pointer;
    }
    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<h1>E-Commerce Catalog</h1>

<h2>Categories</h2>
<button onclick="getCategories()">Load Categories</button>
<div id="categories"></div>

<h2>Products</h2>
<button onclick="getProducts()">Load Products</button>
<div id="products"></div>

<script>
const BASE_URL = "https://your-domain.up.railway.app"; // 🔥 replace this

async function getCategories() {
  const res = await fetch(`${BASE_URL}/api/categories`);
  const data = await res.json();

  const container = document.getElementById("categories");
  container.innerHTML = "";

  data.forEach(cat => {
    container.innerHTML += `
      <div class="card">
        <strong>${cat.name}</strong>
        <p>${cat.description || ""}</p>
      </div>
    `;
  });
}

async function getProducts() {
  const res = await fetch(`${BASE_URL}/api/products`);
  const data = await res.json();

  const container = document.getElementById("products");
  container.innerHTML = "";

  data.forEach(prod => {
    container.innerHTML += `
      <div class="card">
        <strong>${prod.name}</strong>
        <p>Price: $${prod.price}</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
